<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFE8C2">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Skaitymas">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Skaitymas</title>
<style>
  :root{
    --bg-top:#FFF1D6; --bg-bot:#FFD9E8;
    --ink:#34303D; --card:#FFFFFF; --muted:#9A93A6;
    --ctrl:#7C5CBF; --ring:#7C5CBF;
    --shadow:0 18px 40px rgba(52,48,61,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;color:var(--ink);
    background:linear-gradient(160deg,var(--bg-top),var(--bg-bot));
    min-height:100dvh;display:flex;flex-direction:column;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);overflow:hidden}

  .bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .bg span{position:absolute;opacity:.4}
  .top,.progress,.stage,.nav,#mastery{position:relative;z-index:1}

  .top{display:flex;align-items:center;gap:8px;padding:14px 2px 6px}
  .levels{display:flex;gap:8px;flex:1;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .levels::-webkit-scrollbar{display:none}
  .lvl{flex:0 0 auto;border:none;border-radius:999px;cursor:pointer;font:inherit;font-weight:800;
    font-size:clamp(13px,3.4vw,16px);padding:9px 14px;color:var(--ctrl);background:#fff;white-space:nowrap;
    box-shadow:0 3px 0 rgba(124,92,191,.18);transition:transform .12s ease}
  .lvl[aria-pressed="true"]{background:var(--ctrl);color:#fff}
  .lvl.locked{opacity:.45}
  .lvl:active{transform:translateY(2px)}
  .icon-btn{border:none;border-radius:50%;width:46px;height:46px;flex:none;cursor:pointer;
    background:#fff;color:var(--ctrl);font-size:20px;display:grid;place-items:center;
    box-shadow:0 3px 0 rgba(124,92,191,.18);transition:transform .12s ease}
  .icon-btn[aria-pressed="true"]{background:var(--ctrl);color:#fff}
  .icon-btn:active{transform:translateY(2px)}
  .progress{text-align:center;font-weight:800;color:var(--muted);letter-spacing:.04em;font-size:15px;margin:2px 0 4px}

  .stage{flex:1;display:grid;place-items:center;padding:6px 0}
  .card{width:min(88vw,440px);aspect-ratio:5/6;max-height:52dvh;perspective:1400px;
    cursor:pointer;border:none;background:none;padding:0;border-radius:34px}
  .card:focus-visible{outline:4px solid var(--ring);outline-offset:6px}
  .inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.2,.8,.2,1);transform-style:preserve-3d}
  .card.flipped .inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;border-radius:34px;background:var(--card);box-shadow:var(--shadow);
    -webkit-backface-visibility:hidden;backface-visibility:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
  .back{transform:rotateY(180deg)}
  .word{font-weight:900;line-height:1.05;letter-spacing:.01em;white-space:nowrap;font-size:clamp(40px,15vw,90px)}
  .word.sentence{white-space:normal;font-size:clamp(30px,9vw,56px);line-height:1.18}
  .syl{display:inline}
  .dot{color:var(--muted);font-weight:900;margin:0 .1em;opacity:.5}
  .hint{margin-top:22px;color:var(--muted);font-weight:700;font-size:15px}
  .emoji{font-size:clamp(96px,34vw,200px);line-height:1;display:inline-block;filter:drop-shadow(0 10px 14px rgba(0,0,0,.12))}
  .answer{margin-top:14px;font-weight:900;font-size:clamp(22px,7vw,40px);color:var(--ink);white-space:normal}

  .a0{animation:floaty 2.8s ease-in-out infinite}
  .a1{animation:bouncy 1.5s ease-in-out infinite}
  .a2{animation:pulsy 1.9s ease-in-out infinite}
  .a3{animation:swingy 2.3s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-14px) rotate(5deg)}}
  @keyframes bouncy{0%,100%{transform:translateY(0)}50%{transform:translateY(-22px)}}
  @keyframes pulsy{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
  @keyframes swingy{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
  .pop .emoji{animation:pop .5s cubic-bezier(.2,1.6,.4,1)}
  @keyframes pop{0%{transform:scale(.4)}60%{transform:scale(1.12)}100%{transform:scale(1)}}

  .spark{position:fixed;pointer-events:none;font-size:30px;z-index:5;animation:fly .9s ease-out forwards}
  @keyframes fly{0%{opacity:0;transform:translate(0,0) scale(.4)}20%{opacity:1}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.3) rotate(var(--r))}}

  .nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:6px 0 8px}
  .nav button{border:none;cursor:pointer;font:inherit;color:#fff;background:var(--ctrl);box-shadow:0 5px 0 rgba(92,66,150,.45);transition:transform .1s ease}
  .nav .arrow{width:54px;height:54px;border-radius:50%;font-size:23px}
  .nav .say{width:66px;height:66px;border-radius:50%;font-size:29px;background:#E8505B;box-shadow:0 5px 0 rgba(180,40,60,.45)}
  .nav button:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.25)}
  .nav button:focus-visible{outline:4px solid var(--ring);outline-offset:4px}

  #mastery{display:flex;gap:12px;width:min(88vw,440px);margin:0 auto 10px}
  #mastery[hidden]{display:none}
  .mbtn{flex:1;border:none;cursor:pointer;font:inherit;font-weight:800;font-size:15px;
    padding:12px 10px;border-radius:16px;color:#fff;transition:transform .1s ease}
  .mbtn:active{transform:translateY(2px)}
  .mbtn.know{background:#16A085;box-shadow:0 4px 0 rgba(15,120,100,.5)}
  .mbtn.again{background:#E67E22;box-shadow:0 4px 0 rgba(180,100,20,.5)}

  /* Sudėk žodį */
  .build{display:flex;flex-direction:column;align-items:center;gap:16px;width:min(88vw,440px)}
  .build[hidden]{display:none}
  .build .pic{font-size:clamp(80px,26vw,150px);line-height:1}
  .slots{display:flex;gap:8px;justify-content:center;align-items:center;min-height:66px;flex-wrap:wrap}
  .slot{min-width:62px;height:62px;border-radius:14px;border:3px dashed #cdbff0;display:grid;place-items:center;
    font-weight:900;font-size:clamp(24px,7vw,38px);padding:0 8px}
  .slot.filled{border-style:solid;border-color:#16A085;background:#EAFBF5}
  .tiles{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .tile{border:none;cursor:pointer;background:#fff;border-radius:16px;padding:12px 16px;font-weight:900;
    font-size:clamp(24px,7vw,38px);box-shadow:0 5px 0 rgba(124,92,191,.25);transition:transform .1s ease}
  .tile:active{transform:translateY(3px)}
  .tile.used{visibility:hidden}
  .tile.bad{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}60%{transform:translateX(9px)}}
  .build-msg{font-weight:800;font-size:18px;min-height:22px;color:var(--ink);text-align:center}

  /* Rask paveikslėlį */
  .pick{display:flex;flex-direction:column;align-items:center;gap:18px;width:min(88vw,440px)}
  .pick[hidden]{display:none}
  .pword{font-weight:900;white-space:nowrap;letter-spacing:.01em;font-size:clamp(40px,13vw,74px)}
  .pword.sentence{white-space:normal;font-size:clamp(28px,8vw,48px);line-height:1.18;text-align:center}
  .popts{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
  .popt{border:none;cursor:pointer;background:#fff;border-radius:20px;padding:12px;line-height:1;
    font-size:clamp(54px,17vw,86px);box-shadow:0 5px 0 rgba(124,92,191,.2);transition:transform .1s ease, background .2s ease}
  .popt:active{transform:translateY(3px)}
  .popt:disabled{cursor:default}
  .popt.right{background:#D7F5E3;box-shadow:0 5px 0 rgba(22,160,133,.4)}
  .popt.wrong{background:#FCE2E2;animation:shake .4s}
  .pick-msg{font-weight:800;font-size:18px;min-height:22px;color:var(--ink);text-align:center}

  /* Tėvų įrašymas */
  .rec{display:flex;flex-direction:column;align-items:center;gap:14px;width:min(88vw,440px)}
  .rec[hidden]{display:none}
  .rec-count{font-weight:800;color:var(--muted);font-size:14px}
  .rec-word{font-weight:900;font-size:clamp(40px,12vw,64px);color:var(--ink)}
  .rec-status{font-weight:700;color:var(--muted);font-size:15px;text-align:center;min-height:44px;max-width:90%}
  .rec-row{display:flex;align-items:center;justify-content:center;gap:16px}
  .rec-row button{border:none;cursor:pointer;color:#fff;background:var(--ctrl);transition:transform .1s ease}
  .rec-row .small{width:54px;height:54px;border-radius:50%;font-size:22px;box-shadow:0 4px 0 rgba(92,66,150,.45)}
  .rec-row .mic{width:78px;height:78px;border-radius:50%;font-size:32px;background:#E8505B;box-shadow:0 5px 0 rgba(180,40,60,.45)}
  .rec-row .mic.on{background:#C2410C}
  .rec-row button:active{transform:translateY(3px)}
  .rec-del{border:none;background:#fff;color:#E8505B;font-weight:800;border-radius:14px;padding:10px 16px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.08)}
  .rec-backup{display:flex;gap:10px;margin-top:4px}
  .rec-bk{border:none;background:#F1ECFA;color:var(--ctrl);font-weight:800;border-radius:14px;padding:10px 14px;cursor:pointer;box-shadow:0 3px 0 rgba(124,92,191,.18);font-size:14px}
  .rec-bk:active{transform:translateY(2px)}

  /* Raidės (klausyk ir rink raidę) */
  .letters{display:flex;flex-direction:column;align-items:center;gap:16px;width:min(88vw,440px)}
  .letters[hidden]{display:none}
  .lcount{font-weight:800;color:var(--muted);font-size:14px}
  .luni{position:relative;border:none;cursor:pointer;background:none;font-size:clamp(96px,30vw,170px);line-height:1;transition:transform .1s ease;filter:drop-shadow(0 10px 14px rgba(0,0,0,.12))}
  .luni:active{transform:scale(.93)}
  .luni .acc{position:absolute;top:.05em;left:50%;transform:translateX(-50%);font-size:.34em;filter:drop-shadow(0 3px 5px rgba(0,0,0,.2));pointer-events:none}
  .lhint{font-weight:700;color:var(--muted);font-size:15px;margin-top:-8px;text-align:center}
  .lmsg{font-weight:800;font-size:18px;min-height:22px;text-align:center;color:var(--ink)}
  .lopts{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
  .lopt{border:none;cursor:pointer;background:#fff;border-radius:20px;padding:14px;font-weight:900;
    font-size:clamp(44px,14vw,72px);color:var(--ctrl);box-shadow:0 5px 0 rgba(124,92,191,.2);transition:transform .1s ease, background .2s ease}
  .lopt:active{transform:translateY(3px)}
  .lopt:disabled{cursor:default}
  .lopt.right{background:#D7F5E3;color:#16A085;box-shadow:0 5px 0 rgba(22,160,133,.4)}
  .lopt.wrong{background:#FCE2E2;color:#E8505B;animation:shake .4s}

  .bigpic{font-size:clamp(80px,26vw,150px);line-height:1;border:none;background:none;cursor:pointer;padding:0;transition:transform .1s ease}
  .bigpic:active{transform:scale(.94)}
  .bigletter{font-size:clamp(64px,20vw,112px);font-weight:900;color:var(--ctrl);filter:none}
  .findrow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .findtile{border:none;cursor:pointer;background:#fff;border-radius:14px;padding:10px 14px;font-weight:900;
    font-size:clamp(34px,10vw,56px);color:var(--ctrl);box-shadow:0 5px 0 rgba(124,92,191,.2);transition:transform .1s ease, background .2s ease}
  .findtile:active{transform:translateY(3px)}
  .findtile:disabled{cursor:default}
  .findtile.right{background:#D7F5E3;color:#16A085;box-shadow:0 5px 0 rgba(22,160,133,.4)}
  .findtile.wrong{background:#FCE2E2;color:#E8505B;animation:shake .4s}

  .prizes{position:fixed;inset:0;z-index:10;background:rgba(52,48,61,.5);display:flex;align-items:center;justify-content:center;padding:18px}
  .prizes[hidden]{display:none}
  .prizes-card{background:#fff;border-radius:26px;box-shadow:var(--shadow);width:min(92vw,460px);max-height:84dvh;overflow:auto;padding:18px}
  .prizes-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .prizes-title{font-weight:900;font-size:20px;color:var(--ink)}
  .prizes-close{border:none;background:#F1ECFA;color:var(--ctrl);width:38px;height:38px;border-radius:50%;font-size:18px;font-weight:900;cursor:pointer}
  .prizes-comp{display:flex;align-items:center;gap:12px;background:#FBF7FF;border-radius:16px;padding:10px 12px;margin-bottom:12px}
  .prizes-comp .pcuni{position:relative;font-size:54px;line-height:1}
  .prizes-comp .pcacc{position:absolute;top:.02em;left:50%;transform:translateX(-50%);font-size:.4em}
  .prizes-comp .pctext{font-weight:700;color:var(--muted);font-size:14px;line-height:1.35}
  .prizes-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .prize{aspect-ratio:1;border-radius:16px;background:#F5F1FC;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .prize.got{background:#EAFBF5;box-shadow:inset 0 0 0 2px #B6ECD8}
  .prize .pe{font-size:clamp(26px,7vw,34px);line-height:1}
  .prize:not(.got) .pe{opacity:.5}
  .prize .pc{font-size:11px;font-weight:800;color:var(--muted)}

  .toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:#34303D;color:#fff;font-weight:600;font-size:14px;line-height:1.4;padding:13px 16px;border-radius:14px;
    max-width:90vw;text-align:center;opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;z-index:9}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Žvaigždučių stiklainis */
  .statusbar{display:flex;align-items:center;justify-content:center;gap:12px;margin:2px 0 4px}
  .statusbar .progress{margin:0}
  .jar{border:none;cursor:pointer;font:inherit;font-weight:900;color:var(--ctrl);background:#fff;
    border-radius:999px;padding:6px 13px 6px 11px;display:flex;align-items:center;gap:5px;font-size:15px;
    box-shadow:0 3px 0 rgba(124,92,191,.18);transition:transform .12s ease}
  .jar:active{transform:translateY(2px)}
  .jar .jic{font-size:18px}
  .jar.bump{animation:jarbump .55s cubic-bezier(.2,1.6,.4,1)}
  @keyframes jarbump{0%{transform:scale(1)}40%{transform:scale(1.24)}100%{transform:scale(1)}}
  .flystar{position:fixed;left:0;top:0;pointer-events:none;font-size:26px;z-index:8;will-change:transform,opacity}

  /* Raidžių vedžiojimas pirštu */
  .tracebox{position:relative;width:min(74vw,300px);aspect-ratio:1;background:#fff;border-radius:28px;
    box-shadow:var(--shadow);touch-action:none}
  .tracebox canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:28px;touch-action:none}
  .lrow{display:flex;align-items:center;justify-content:center;gap:16px}
  .lrow .small{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;color:#fff;background:var(--ctrl);
    font-size:22px;box-shadow:0 4px 0 rgba(92,66,150,.45);transition:transform .1s ease}
  .lrow .small:active{transform:translateY(3px)}
  .lrow .small[hidden]{display:none}
  .lrow .go{width:64px;height:64px;font-size:28px;background:#16A085;box-shadow:0 5px 0 rgba(15,120,100,.5);animation:gopulse 1s ease-in-out infinite}
  @keyframes gopulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .luni.cheer{animation:cheerjump .7s ease}
  @keyframes cheerjump{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-26px) scale(1.08)}
    55%{transform:translateY(0) scale(1)}78%{transform:translateY(-11px)}}
  .uni-idle{animation:idlebob 3.4s ease-in-out infinite}
  @keyframes idlebob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-9px) rotate(2deg)}}
  .drop-in{animation:dropin .36s cubic-bezier(.2,1.5,.4,1) both}
  @keyframes dropin{0%{opacity:0;transform:translateY(-12px) scale(.7)}100%{opacity:1;transform:none}}
  .confq{position:fixed;top:0;left:0;width:11px;height:14px;border-radius:3px;pointer-events:none;z-index:8;will-change:transform,opacity}

  /* Žemi ekranai (telefonai) – kad apatiniai mygtukai tilptų */
  @media (max-height:760px){
    .card{max-height:46dvh}
    .top{padding:8px 2px 4px}
    .nav{padding:4px 0 6px;gap:12px}
    .nav .arrow{width:48px;height:48px;font-size:21px}
    .nav .say{width:58px;height:58px;font-size:26px}
    #mastery{margin-bottom:8px}
    .mbtn{padding:10px 8px;font-size:14px}
    .statusbar{margin:0}
    .tracebox{width:min(64vw,260px)}
  }
  @media (max-height:640px){
    .card{max-height:40dvh}
    .nav .arrow{width:44px;height:44px;font-size:19px}
    .nav .say{width:52px;height:52px;font-size:23px}
    .tracebox{width:min(58vw,230px)}
  }

  @media (prefers-reduced-motion: reduce){
    .inner{transition:none}.spark{animation:none}.a0,.a1,.a2,.a3,.pop .emoji{animation:none}
    .jar.bump,.luni.cheer,.lrow .go,.uni-idle,.drop-in{animation:none}
  }
</style>
</head>
<body>

  <div class="bg" aria-hidden="true"></div>

  <noscript>
    <div style="padding:24px;margin:24px;border-radius:16px;background:#fff;text-align:center;font-weight:700;line-height:1.4;color:#34303D;box-shadow:0 8px 24px rgba(0,0,0,.12)">
      Kad programėlė veiktų, atidarykite šį failą interneto naršyklėje (pvz. Chrome).
    </div>
  </noscript>

  <div class="top">
    <div class="levels" id="levels"></div>
    <button class="icon-btn" id="shuffle" title="Sumaišyti">🔀</button>
    <button class="icon-btn" id="audio" aria-pressed="true" title="Garsas">🔊</button>
    <button class="icon-btn" id="buildBtn" title="Sudėk žodį">🧩</button>
    <button class="icon-btn" id="pickBtn" title="Rask paveikslėlį">🖼️</button>
    <button class="icon-btn" id="micBtn" title="Įrašyti balsą (tėvams)">🎙️</button>
  </div>

  <div class="statusbar">
    <div class="progress" id="progress">1 / 1</div>
    <button class="jar" id="starjar" title="Surinktos žvaigždės"><span class="jic">🫙</span><span id="starCount">0</span></button>
  </div>

  <div class="stage">
    <button class="card" id="card" aria-label="Kortelė. Palieskite, kad pamatytumėte paveikslėlį">
      <div class="inner">
        <div class="face front">
          <div class="word" id="word"></div>
          <div class="hint" id="hint">palieskite kortelę 👆</div>
        </div>
        <div class="face back">
          <div class="emoji" id="emoji"></div>
          <div class="answer" id="answer"></div>
        </div>
      </div>
    </button>

    <div class="build" id="build" hidden>
      <div class="pic" id="bPic"></div>
      <div class="slots" id="bSlots"></div>
      <div class="tiles" id="bTiles"></div>
      <div class="build-msg" id="bMsg"></div>
    </div>

    <div class="pick" id="pick" hidden>
      <div class="pword" id="pWord"></div>
      <div class="popts" id="pOpts"></div>
      <div class="pick-msg" id="pMsg"></div>
    </div>

    <div class="rec" id="rec" hidden>
      <div class="rec-count" id="recCount"></div>
      <div class="rec-word" id="recWord"></div>
      <div class="rec-row">
        <button class="small" id="recPrev" aria-label="Ankstesnis">◀</button>
        <button class="mic" id="recRecord" aria-label="Įrašyti">●</button>
        <button class="small" id="recNext" aria-label="Kitas">▶</button>
      </div>
      <div class="rec-status" id="recStatus"></div>
      <button class="small" id="recPlay" style="background:#16A085;box-shadow:0 4px 0 rgba(15,120,100,.45)" aria-label="Klausyti">▶</button>
      <button class="rec-del" id="recDel">🗑 Ištrinti šio žodžio įrašą</button>
      <div class="rec-backup">
        <button class="rec-bk" id="recExport">⬇️ Atsarginė kopija</button>
        <button class="rec-bk" id="recImport">⬆️ Atkurti</button>
      </div>
      <input type="file" id="recFile" accept="application/json,.json" hidden>
    </div>

    <div class="letters" id="letters" hidden>
      <div class="lcount" id="lCount"></div>
      <button class="luni uni-idle" id="lUni" aria-label="Klausyk">🦄<span class="acc" id="lAcc"></span></button>

    const old=stars, before=stageIndex(stars);
    stars++; const sc=$("starCount"); if(sc) sc.textContent=stars; save();

    if(!jar || !srcEl || matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    const s=srcEl.getBoundingClientRect(), j=jar.getBoundingClientRect();

    setTimeout(()=>star.remove(),770);
  }

  function mapStroke(st,bb){ return st.map(p=>[bb.x+p[0]*bb.w, bb.y+p[1]*bb.h]); }
  function densify(st){ const out=[]; for(let i=0;i<st.length-1;i++){ const a=st[i],b=st[i+1],len=Math.hypot(b[0]-a[0],b[1]-a[1]),steps=Math.max(1,(len/6)|0); for(let s=0;s<steps;s++){ const t=s/steps; out.push([a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t]); } } out.push(st[st.length-1]); return out; }

  function buildGhost(L){
    const g=document.createElement("canvas"); g.width=TS; g.height=TS;
    const gx=g.getContext("2d");
    gx.font=TFONT; gx.textAlign="center"; gx.textBaseline="middle";
    gx.fillStyle="#ECE5FB"; gx.fillText(L, TS/2, TS/2);
    ghost=g;
    const m=document.createElement("canvas"); m.width=TS; m.height=TS;
    const c2=m.getContext("2d");
    c2.font=TFONT; c2.textAlign="center"; c2.textBaseline="middle";
    c2.fillStyle="#000"; c2.fillText(L, TS/2, TS/2);
    const d=c2.getImageData(0,0,TS,TS).data;
    need=new Set(); needList=[]; const ink=[];
    for(let r=0;r<TG;r++) for(let c=0;c<TG;c++){
      const px=(c*TC+TC/2)|0, py=(r*TC+TC/2)|0;
      if(d[(py*TS+px)*4+3]>60){ const cx=c*TC+TC/2, cy=r*TC+TC/2, i=r*TG+c; need.add(i); needList.push([i,cx,cy]); ink.push([cx,cy]); }
    }
    tNeed=need.size||1;
    let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    for(const p of ink){ if(p[0]<minX)minX=p[0]; if(p[0]>maxX)maxX=p[0]; if(p[1]<minY)minY=p[1]; if(p[1]>maxY)maxY=p[1]; }
    const bb={x:minX,y:minY,w:Math.max(1,maxX-minX),h:Math.max(1,maxY-minY)};
    const tpl=STROKES[L];
    if(tpl){ gStrokes=tpl.map(st=>mapStroke(st,bb)); gSeq=[]; gStrokes.forEach(s=>densify(s).forEach(p=>gSeq.push(p))); startPt=gStrokes[0][0]; }
    else { const pts=ink.slice().sort((a,b)=> a[1]-b[1] || a[0]-b[0]); gStrokes=[pts]; gSeq=pts; startPt=pts[0]||null; }
  }
  function renderTrace(){
    tctx.clearRect(0,0,TS,TS);

  function recGo(n){ recIdx=(recIdx+n+recList.length)%recList.length; renderRec(); }
  async function toggleRecord(){
    if(mediaRec && mediaRec.state==="recording"){ mediaRec.stop(); return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      chunks=[]; mediaRec=new MediaRecorder(stream);
      mediaRec.ondataavailable=e=>{ if(e.data && e.data.size) chunks.push(e.data); };
      mediaRec.onstop=async ()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunks,{type:(mediaRec&&mediaRec.mimeType)||"audio/webm"});
        const k=recList[recIdx].key;
        try{ await putRec(k,blob); recSet.add(k); $("recStatus").textContent="✅ įrašyta! paspausk ▶ pasiklausyti"; }
        catch(e){ $("recStatus").textContent="Nepavyko išsaugoti įrašo."; }
        $("recRecord").classList.remove("on"); $("recRecord").textContent="●";
      };
      mediaRec.start(); $("recRecord").classList.add("on"); $("recRecord").textContent="■";
      $("recStatus").textContent="įrašoma… pasakyk žodį ir paspausk ■";
    }catch(e){
      $("recStatus").textContent="Mikrofonas neprieinamas. Įrašymui programėlė turi būti atidaryta per https nuorodą (ne iš failo).";
    }
  }
  async function playRec(k){
    try{ const b=await getRec(k); if(b){ const u=URL.createObjectURL(b); const a=new Audio(u); a.onended=()=>URL.revokeObjectURL(u); a.play(); return true; } }catch(e){}
    return false;
  }
  $("recRecord").onclick=toggleRecord;
  $("recPrev").onclick=()=>recGo(-1);
  $("recNext").onclick=()=>recGo(1);
  $("recPlay").onclick=async ()=>{ const ok=await playRec(recList[recIdx].key); if(!ok) $("recStatus").textContent="Dar neįrašyta."; };
  $("recDel").onclick=async ()=>{ const k=recList[recIdx].key; try{ await delRec(k); recSet.delete(k); }catch(e){} renderRec(); };
  $("recExport").onclick=exportData;
  $("recImport").onclick=()=>$("recFile").click();
  $("recFile").onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(f) importData(f); e.target.value=""; };

  // pagrindinis atkūrimas: jei yra įrašas – grok jį, kitaip robotas
  async function sayWord(w, wordOnly, force){
    if(!audioOn && !force) return;
    if(await playRec(recKey(w))) return;
    speak(w, wordOnly);
  }

  // ---- Pagyrimai / padrąsinimai (tėvų įrašomi) ----
  const PRAISE=["VALIO","ATSPĖJAI","ŠAUNUOLYTĖ","VAU","PUIKU"];
  const ENCOURAGE="PABANDYK DAR KARTELĮ";
  function ttsSay(t){ if(!("speechSynthesis" in window)) return; const v=ltVoice(); if(!v) return; speechSynthesis.cancel(); utter(t.toLowerCase(),.95,v); }
  async function cheer(){
    if(!audioOn) return;
    const have=PRAISE.filter(k=>recSet.has(k));
    if(have.length && await playRec(have[(Math.random()*have.length)|0])) return;
    ttsSay(PRAISE[(Math.random()*PRAISE.length)|0]);
  }
  async function nudge(){
    if(!audioOn) return;
    if(recSet.has(ENCOURAGE) && await playRec(ENCOURAGE)) return;
    ttsSay("pabandyk dar");
  }

  buildRecList(); loadRecKeys();

  // statiškas fonas
  (function makeBg(){
    const layer=document.querySelector(".bg"); if(!layer) return;
    const pool=["🦄","🌈","⭐","✨","☁️","🌟","🦄","🌈","💖","🌸","🦄","🌈"];
    for(let i=0;i<12;i++){
      const s=document.createElement("span"); s.textContent=pool[i%pool.length];
      s.style.left=(Math.random()*92)+"vw"; s.style.top=(Math.random()*90)+"vh";
      s.style.fontSize=(46+Math.random()*60)+"px";
      s.style.opacity=(0.18+Math.random()*0.18).toFixed(2);
      s.style.transform="rotate("+(Math.random()*40-20)+"deg)";
      layer.appendChild(s);
    }
  })();

  // ---- Paleidimas: užkrauname išsaugotą progresą ----
  load();
  $("starCount").textContent=stars;
  updateCompanion();
  renderLevelLabels();
  function resetProgress(){
    stars=0; weights={}; save();
    $("starCount").textContent=stars; updateCompanion();
    if(mode==="letters"){ lSolved=0; $("lCount").textContent="Raidės · 0 ⭐"; }
    if(mode==="trace"){ lSolved=0; $("tCount").textContent="Vedžiok · 0 ⭐"; }
    toast("Žvaigždės atstatytos – nuo nulio 🌱");
  }
  let jarHold=null, jarHeld=false;
  function startHold(){ jarHeld=false; clearTimeout(jarHold); jarHold=setTimeout(()=>{ jarHeld=true; if(confirm("Atstatyti visas žvaigždes ir progresą iš naujo?")) resetProgress(); }, 750); }
  function endHold(){ clearTimeout(jarHold); }
  const jarEl=$("starjar");
  jarEl.addEventListener("pointerdown",startHold);
  jarEl.addEventListener("pointerup",endHold);
  jarEl.addEventListener("pointerleave",endHold);
  jarEl.addEventListener("pointercancel",endHold);
  jarEl.onclick=()=>{
    if(jarHeld){ jarHeld=false; return; }     // ilgas paspaudimas – ne paprastas tapas
    jarEl.classList.remove("bump"); void jarEl.offsetWidth; jarEl.classList.add("bump");
    openPrizes();
  };
  $("prizesClose").onclick=closePrizes;
  $("prizes").addEventListener("click",e=>{ if(e.target===$("prizes")) closePrizes(); });

  const lg0=LEVELS[lvl].game;
  if(lg0) setMode(lg0); else setLevel();

  // ---- PWA: registruojam service worker (kad veiktų be interneto / būtų įdiegiama) ----
  if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
</body>
</html>
